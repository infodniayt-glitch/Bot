<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>AI Bot Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-4 text-blue-400">🤖 AI Trading Bot</h1>
        
        <div class="bg-gray-800 p-4 rounded mb-4">
            <p class="text-gray-400 text-xs">STATUS:</p>
            <p id="status" class="text-xl font-bold text-yellow-500">Ładowanie...</p>
        </div>

        <div class="bg-gray-800 p-4 rounded mb-4">
            <p class="text-gray-400 text-xs">SALDO:</p>
            <p class="text-2xl">$ <span id="balance">1000.00</span></p>
        </div>
    </div>

    <script>
        function update() {
            fetch('/api/stats')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('status').innerText = data.status;
                    document.getElementById('balance').innerText = data.balance.toFixed(2);
                });
        }
        setInterval(update, 3000);
        update();
    </script>
</body>
</html>
